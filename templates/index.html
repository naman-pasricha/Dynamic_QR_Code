<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRFlow | Dynamic QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(99, 102, 241, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .create-section {
            margin-bottom: 4rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .form-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            min-width: 250px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.8rem 1.2rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        button.btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.8rem 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        /* New Generator Layout */
        .generator-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .main-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-stack {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .main-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem !important;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        /* Style Selector */
        .style-selector {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .style-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.75rem;
            border: 2px solid var(--border-color);
            background: rgba(15, 23, 42, 0.4);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .style-btn.active {
            border-color: var(--primary);
            background: var(--accent-glow);
            color: white;
        }

        .style-btn.inverted-style {
            background: #000;
            color: #fff;
            border-color: #333;
        }

        .style-btn.inverted-style.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Preview Box */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .preview-box {
            background: white;
            width: 200px;
            height: 200px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            margin-top: 1rem;
            position: relative;
        }

        #qrcodePreview {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #previewText {
            position: absolute;
            color: #0f172a;
            font-size: 0.8rem;
            padding: 1rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title h2 {
            font-size: 1.5rem;
        }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .qr-card {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: transform 0.3s ease;
        }

        .qr-card:hover {
            transform: translateY(-5px);
        }

        .qr-image-container {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-image-container img {
            max-width: 100%;
            height: auto;
        }

        .qr-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1.25rem;
        }

        .qr-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            word-break: break-all;
            margin-bottom: 1rem;
        }

        .qr-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        .btn-icon {
            flex: 1;
            padding: 0.6rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 90%;
            max-width: 500px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .form-group { flex-direction: column; }
            input { width: 100%; }
        }
    </style>
    <!-- Lucide Icons & QR Preview Lib -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-wrapper">
                <i data-lucide="qr-code" style="width: 48px; height: 48px; color: var(--primary);"></i>
            </div>
            <h1>QRFlow</h1>
            <p class="subtitle">Create, manage, and update QR codes in real-time.</p>
        </header>

        <section class="generator-container">
            <div class="create-section glass-card">
                <h2>Create Dynamic QR</h2>
                <form action="/create" method="POST" class="main-form">
                    <div class="input-stack">
                        <div class="field">
                            <label><i data-lucide="tag"></i> Label</label>
                            <input type="text" name="label" id="labelInput" placeholder="e.g. My Website" required>
                        </div>
                        <div class="field">
                            <label><i data-lucide="link"></i> Destination URL</label>
                            <input type="url" name="target_url" id="urlInput" placeholder="https://example.com" required>
                        </div>
                        <div class="field">
                            <label><i data-lucide="palette"></i> QR Style</label>
                            <div class="style-selector">
                                <button type="button" id="styleDefault" class="style-btn active">
                                    <i data-lucide="sun"></i> Classic
                                </button>
                                <button type="button" id="styleInverted" class="style-btn inverted-style">
                                    <i data-lucide="moon"></i> Inverted
                                </button>
                            </div>
                            <input type="hidden" name="fill_color" id="fillColor" value="black">
                            <input type="hidden" name="back_color" id="backColor" value="white">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary main-submit">
                        <span>Generate & Save</span>
                        <i data-lucide="arrow-right"></i>
                    </button>
                </form>
            </div>

            <div class="preview-section glass-card">
                <h2>Live Preview</h2>
                <div id="previewBox" class="preview-box">
                    <div id="qrcodePreview"></div>
                    <p id="previewText">Enter a URL to see preview</p>
                </div>
            </div>
        </section>

        <div class="section-title">
            <i data-lucide="layers"></i>
            <h2>Your QR Codes</h2>
        </div>

        <section class="qr-grid">
            {% for qr in qrcodes %}
            <div class="qr-card glass-card">
                <div class="qr-image-container">
                    <img src="/generated/{{ qr.id }}.png" alt="{{ qr.label }}">
                </div>
                <div class="qr-info">
                    <h3>{{ qr.label }}</h3>
                    <p>{{ qr.target_url }}</p>
                    <small style="color: var(--text-muted); display: block; margin-bottom: 0.5rem;">
                        Short URL: {{ request.host_url }}r/{{ qr.short_code }}
                    </small>
                </div>
                <div class="qr-actions">
                    <button class="btn-icon" onclick="openEditModal('{{ qr.id }}', '{{ qr.label }}', '{{ qr.target_url }}')">
                        <i data-lucide="edit-3"></i> Edit
                    </button>
                    <a href="/generated/{{ qr.id }}.png" download="{{ qr.label }}.png" class="btn-icon">
                        <i data-lucide="download"></i> Save
                    </a>
                    <a href="/delete/{{ qr.id }}" class="btn-icon btn-delete" onclick="return confirm('Are you sure?')">
                        <i data-lucide="trash-2"></i> Delete
                    </a>
                </div>
            </div>
            {% endfor %}
        </section>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content glass-card">
            <h2 style="margin-bottom: 1.5rem;">Update QR Destination</h2>
            <form id="editForm" method="POST" class="form-group" style="flex-direction: column; gap: 1rem;">
                <div style="width: 100%;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Label</label>
                    <input type="text" name="label" id="editLabel" style="width: 100%;" required>
                </div>
                <div style="width: 100%;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">New URL</label>
                    <input type="url" name="target_url" id="editUrl" style="width: 100%;" required>
                </div>
                <div style="display: flex; gap: 1rem; width: 100%; margin-top: 1rem;">
                    <button type="button" class="btn-icon" onclick="closeEditModal()" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn-primary" style="flex: 2;">Update Link</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Live Preview Logic
        const urlInput = document.getElementById('urlInput');
        const qrcodePreview = document.getElementById('qrcodePreview');
        const previewText = document.getElementById('previewText');
        
        const qrcode = new QRCode(qrcodePreview, {
            width: 180,
            height: 180,
            colorDark: "#0f172a",
            colorLight: "#ffffff"
        });

        urlInput.addEventListener('input', (e) => {
            updatePreview();
        });

        // Theme Selection
        const styleDefault = document.getElementById('styleDefault');
        const styleInverted = document.getElementById('styleInverted');
        const fillColor = document.getElementById('fillColor');
        const backColor = document.getElementById('backColor');
        const previewBox = document.getElementById('previewBox');

        function updatePreview() {
            const val = urlInput.value;
            const dark = fillColor.value;
            const light = backColor.value;

            // Clear previous QR
            qrcodePreview.innerHTML = '';
            
            if (val) {
                new QRCode(qrcodePreview, {
                    text: val,
                    width: 180,
                    height: 180,
                    colorDark: dark === 'white' ? '#ffffff' : '#0f172a',
                    colorLight: light === 'black' ? '#000000' : '#ffffff'
                });
                previewText.style.display = 'none';
                qrcodePreview.style.opacity = '1';
                
                // Update preview box background
                previewBox.style.background = light === 'black' ? '#000' : '#fff';
            } else {
                qrcodePreview.style.opacity = '0';
                previewText.style.display = 'block';
                previewBox.style.background = '#fff';
                previewText.style.color = '#0f172a';
            }
        }

        styleDefault.addEventListener('click', () => {
            styleDefault.classList.add('active');
            styleInverted.classList.remove('active');
            fillColor.value = 'black';
            backColor.value = 'white';
            updatePreview();
        });

        styleInverted.addEventListener('click', () => {
            styleInverted.classList.add('active');
            styleDefault.classList.remove('active');
            fillColor.value = 'white';
            backColor.value = 'black';
            updatePreview();
        });

        function openEditModal(id, label, url) {
            const modal = document.getElementById('editModal');
            const form = document.getElementById('editForm');
            const labelInput = document.getElementById('editLabel');
            const urlInput = document.getElementById('editUrl');

            form.action = '/update/' + id;
            labelInput.value = label;
            urlInput.value = url;
            
            modal.style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeEditModal();
            }
        }
    </script>
</body>
</html>
